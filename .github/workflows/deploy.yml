name: Deploy React App

on:
  push:
    branches: [ "main" ] # Скрипт спрацьовує при пуші в гілку main
  workflow_dispatch: # Дозволяє запускати деплой вручну з GitHub

# Надаємо workflow права на запис для створення деплою
permissions:
  contents: read
  pages: write
  id-token: write

# Дозволяє скасувати незавершені запуски, якщо виходить нове оновлення
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Рекомендована версія Node.js у 2026 році
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      # Зверніть увагу: Vite збирає в 'dist', а Create React App в 'build'
      - name: Upload production artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Змініть на './build', якщо у вас Create React App

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
